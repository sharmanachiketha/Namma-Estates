<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bengaluru Real Estate | Smart Predictive Mapping</title>
    <meta name="description" content="Interactive predictive real estate mapping for Bengaluru based on live news sentiment and current market prices.">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar / Control Panel -->
        <aside class="sidebar glass-panel">
            <header>
                <h1>Namma<span class="highlight">Estates</span></h1>
                <p>AI-Powered Real Estate Intelligence</p>
            </header>

            <div class="areas-section">
                <h2>Explore Zones</h2>
                <div id="areas-list" class="areas-list">
                    <!-- Area buttons injected via JS -->
                </div>
            </div>

            <div id="info-panel" class="info-panel hidden">
                <h2 id="info-title">Area Name</h2>
                
                <div class="price-cards">
                    <div class="card current-price">
                        <span class="label">Current Avg Price</span>
                        <h3 id="current-price">₹-- / sqft</h3>
                    </div>
                    <div class="card predicted-price">
                        <span class="label">Predicted Future Price</span>
                        <h3 id="predicted-price">₹-- / sqft</h3>
                        <div id="trend-indicator" class="trend-indicator">
                            <span id="trend-icon"></span>
                            <span id="trend-percent">--%</span>
                        </div>
                    </div>
                </div>

                <div class="reasoning-box">
                    <h4>Market Outlook</h4>
                    <p id="reasoning-text">Select an area to view market predictions based on live news data.</p>
                </div>

                <!-- Tabs Section -->
                <div class="tabs-container">
                    <div class="tabs-header">
                        <button class="tab-btn active" onclick="switchTab('news')">News</button>
                        <button class="tab-btn" onclick="switchTab('social')">Social Sentiment</button>
                    </div>
                    
                    <div id="tab-news" class="tab-content active">
                        <ul id="news-list" class="data-list">
                            <!-- News items injected via JS -->
                        </ul>
                    </div>
                    
                    <div id="tab-social" class="tab-content">
                        <ul id="social-list" class="data-list">
                            <!-- Social items injected via JS -->
                        </ul>
                    </div>
                </div>
            </div>
            
            <div id="loading-state" class="loading-state hidden">
                <div class="spinner"></div>
                <p>Analyzing live market & sentiment data...</p>
            </div>
        </aside>

        <!-- Main Map Area -->
        <main class="map-container">
            <div id="map"></div>
        </main>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
